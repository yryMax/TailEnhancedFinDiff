trigger:
  branches:
    include:
      - dev
      - main

pool:
  vmImage: 'ubuntu-latest'

steps:
  - task: UsePythonVersion@0
    inputs:
      versionSpec: '3.9'

  - script: pip install databricks-cli
    displayName: 'Install Databricks CLI'

  - script: |
      echo "Host: $DATABRICKS_HOST"
      echo "Token length: ${#DATABRICKS_TOKEN}"
      
      export DATABRICKS_HOST=$(DATABRICKS_HOST)
      export DATABRICKS_TOKEN=$(DATABRICKS_TOKEN)
      
      echo "Testing connection..."
      databricks fs ls dbfs:/ || echo "CONNECTION FAILED"
      
      echo "Copying files..."
      databricks fs cp ./factor_diffusion_train.py dbfs:/FileStore/interns/renyi/code/factor_diffusion_train.py --overwrite
      databricks fs cp ./factor_diffusion_sample.py dbfs:/FileStore/interns/renyi/code/factor_diffusion_sample.py --overwrite
    displayName: 'Sync diffusion scripts'

  - task: CopyFiles@2
    displayName: 'Stage artifacts'
    condition: eq(variables['Build.SourceBranch'], 'refs/heads/main')
    inputs:
      contents: |
        data/*.parquet
        model.zip
      targetFolder: '$(Build.ArtifactStagingDirectory)'

  - task: PublishBuildArtifacts@1
    displayName: 'Publish data & model artifacts'
    condition: eq(variables['Build.SourceBranch'], 'refs/heads/main')
    inputs:
      pathToPublish: '$(Build.ArtifactStagingDirectory)'
      artifactName: 'data-and-model'
      publishLocation: 'Container'
